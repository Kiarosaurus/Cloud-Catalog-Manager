# Nginx para la SPA en producción (EC2).
#  - Sirve los estáticos del build de Vite.
#  - try_files: cualquier ruta desconocida -> index.html (react-router).
#  - /api -> reverse proxy al contenedor backend (red interna de compose).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy hacia FastAPI. 'backend' = nombre del service en compose.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Permitir subir imágenes de hasta 10 MB.
        client_max_body_size 10M;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
